<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOP THỜI TRANG PRO MAX</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

header{
  background:black;color:white;
  padding:15px;text-align:center;
  font-size:20px;font-weight:bold;
}

.search{padding:10px;text-align:center;background:white}
.search input{width:60%;padding:10px;border-radius:10px;border:1px solid #ccc}

.filter{display:flex;justify-content:center;gap:10px;padding:10px}
.filter button{
  padding:8px 16px;border:none;border-radius:20px;
  background:#eee;cursor:pointer;font-weight:bold
}
.filter button.active,
.filter button:hover{background:black;color:white}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;padding:15px;
}

.card{
  background:white;border-radius:15px;padding:10px;
  text-align:center;position:relative;
  transition:0.3s;box-shadow:0 5px 15px rgba(0,0,0,0.1)
}
.card:hover{transform:translateY(-5px)}

.card img{width:100%;border-radius:10px}

.badge{
  position:absolute;top:10px;left:10px;
  background:red;color:white;padding:3px 6px;
  font-size:12px;border-radius:5px
}
.stock{top:35px;background:orange}

.price-old{text-decoration:line-through;color:gray;font-size:13px}
.price{color:red;font-weight:bold;font-size:18px}

.btn{
  display:block;margin-top:8px;
  background:black;color:white;padding:10px;
  border-radius:8px;text-decoration:none
}
.btn:hover{background:red}

.cart{
  position:fixed;right:15px;top:80px;
  background:white;padding:15px;border-radius:15px;
  width:250px;box-shadow:0 0 15px rgba(0,0,0,0.2)
}

#countdown{text-align:center;color:red;font-weight:bold}

.popup-buy{
  position:fixed;bottom:20px;left:20px;
  background:black;color:white;padding:10px 15px;
  border-radius:10px;display:none
}
</style>
</head>

<body>

<header>🔥 SHOP THỜI TRANG PRO MAX 🔥</header>

<div class="search">
<input type="text" id="search" placeholder="Tìm sản phẩm...">
</div>

<div class="filter">
<button onclick="filterPrice(0)" class="active">Tất cả</button>
<button onclick="filterPrice(200000)">Dưới 200k</button>
<button onclick="filterPrice(300000)">Dưới 300k</button>
</div>

<div id="countdown"></div>

<div class="products" id="products"></div>

<div class="cart">
<h3>🛒 Giỏ hàng</h3>
<div id="cart"></div>
<p>Tổng: <span id="total">0</span>đ</p>
</div>

<div class="popup-buy" id="popupBuy"></div>

<script>
let data = [];
let cart=[];
let total=0;

async function loadProducts(){
  const res = await fetch("https://script.google.com/macros/s/AKfycbyxjwbJ9vMi6JIgk024SqL2HwDgJHCaM_KG3PRtkr_0tP7IzfQ75QoTOWwS-gX6Cbql/exec");
  data = await res.json();
  render(data);
}

function render(list){
  let html="";

  list.forEach(p=>{
    html+=`
    <div class="card">
      <div class="badge">🔥 HOT</div>
      <div class="badge stock">⚡ Còn ${p.stock||Math.floor(Math.random()*20)}</div>

      <img src="${p.image}">

      <h4>${p.name}</h4>

      <div class="price-old">${p.oldPrice||"150.000đ"}</div>
      <div class="price">${p.price}</div>

      <p>⭐ 4.9 | ${Math.floor(Math.random()*300)} đã bán</p>
      <p style="color:green">👀 ${Math.floor(Math.random()*20+5)} đang xem</p>

      <a class="btn" href="${p.link}" target="_blank">🛒 MUA NGAY - GIẢM SỐC</a>
    </div>
    `;
  });

  document.getElementById("products").innerHTML=html;
}

// SEARCH
search.onkeyup=function(){
  let v=this.value.toLowerCase();
  render(data.filter(p=>p.name.toLowerCase().includes(v)));
}

// FILTER
function filterPrice(max){
  document.querySelectorAll('.filter button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');

  if(max==0) render(data);
  else render(data.filter(p=>parseInt(p.price)<=max));
}

// CART
function addCart(name,price){
  cart.push({name,price});
  total+=price;
  document.getElementById("total").innerText=total;
}

// COUNTDOWN
let time=900;
setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById("countdown").innerText=
  "⏳ Deal kết thúc sau: "+m+":"+(s<10?"0":"")+s;
  time--;
},1000);

// FAKE POPUP BUY
setInterval(()=>{
  let names=["Lan","Hương","Minh","Vy","Trang"];
  let name=names[Math.floor(Math.random()*names.length)];
  let el=document.getElementById("popupBuy");
  el.innerText=`🔥 ${name} vừa mua sản phẩm`;
  el.style.display="block";

  setTimeout(()=>el.style.display="none",3000);
},5000);

loadProducts();
</script>

</body>
</html>
